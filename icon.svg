<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="goldBg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#FFF3C4"/>
      <stop offset="55%" stop-color="#FCE588"/>
      <stop offset="100%" stop-color="#F7D45C"/>
    </radialGradient>
    <radialGradient id="sunDisc" cx="42%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#FFC947"/>
      <stop offset="100%" stop-color="#FF9F1C"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#goldBg)"/>

  <!-- raios do sol -->
  <g fill="#FFA83D">
    <g id="rayGroup">
      <rect x="248" y="60" width="16" height="46" rx="8"/>
    </g>
    <use href="#rayGroup" transform="rotate(22.5 256 230)"/>
    <use href="#rayGroup" transform="rotate(45 256 230)"/>
    <use href="#rayGroup" transform="rotate(67.5 256 230)"/>
    <use href="#rayGroup" transform="rotate(90 256 230)"/>
    <use href="#rayGroup" transform="rotate(112.5 256 230)"/>
    <use href="#rayGroup" transform="rotate(135 256 230)"/>
    <use href="#rayGroup" transform="rotate(157.5 256 230)"/>
    <use href="#rayGroup" transform="rotate(180 256 230)"/>
    <use href="#rayGroup" transform="rotate(202.5 256 230)"/>
    <use href="#rayGroup" transform="rotate(225 256 230)"/>
    <use href="#rayGroup" transform="rotate(247.5 256 230)"/>
    <use href="#rayGroup" transform="rotate(270 256 230)"/>
    <use href="#rayGroup" transform="rotate(292.5 256 230)"/>
    <use href="#rayGroup" transform="rotate(315 256 230)"/>
    <use href="#rayGroup" transform="rotate(337.5 256 230)"/>
  </g>

  <!-- linhas do horizonte atrás do sol -->
  <g stroke="#E3A63C" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.55">
    <path d="M120 250 Q 200 225 300 245 T 400 235"/>
    <path d="M110 275 Q 210 255 300 270 T 405 262"/>
  </g>

  <!-- disco do sol -->
  <circle cx="256" cy="230" r="100" fill="url(#sunDisc)"/>

  <!-- cruz -->
  <g fill="#FFFFFF">
    <rect x="238" y="150" width="36" height="222" rx="14"/>
    <rect x="188" y="196" width="136" height="36" rx="14"/>
  </g>
</svg>
