<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDECC8"/>
      <stop offset="45%" stop-color="#F0B86E"/>
      <stop offset="100%" stop-color="#8D4E2A"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE9A8" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#F7C55C" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#F7C55C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="104" fill="url(#sky)"/>

  <!-- brilho do sol nascendo -->
  <circle cx="256" cy="330" r="190" fill="url(#sunGlow)"/>

  <!-- raios -->
  <g stroke="#FBDA8B" stroke-width="10" stroke-linecap="round" opacity="0.85">
    <line x1="256" y1="150" x2="256" y2="118"/>
    <line x1="150" y1="222" x2="122" y2="200"/>
    <line x1="362" y1="222" x2="390" y2="200"/>
    <line x1="118" y1="330" x2="86" y2="330"/>
    <line x1="394" y1="330" x2="426" y2="330"/>
  </g>

  <!-- disco do sol -->
  <circle cx="256" cy="330" r="92" fill="#F7C55C"/>

  <!-- horizonte -->
  <rect x="0" y="392" width="512" height="120" fill="#7A431F"/>
  <rect x="0" y="392" width="512" height="10" fill="#5C2F16" opacity="0.4"/>

  <!-- cruz -->
  <g fill="#3E2723">
    <rect x="234" y="90" width="44" height="330" rx="14"/>
    <rect x="150" y="196" width="212" height="44" rx="14"/>
  </g>
  <g fill="#FDECC8" opacity="0.18">
    <rect x="234" y="90" width="18" height="330" rx="9"/>
  </g>
</svg>
